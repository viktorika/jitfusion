# Publish the Jekyll site under the repo root to GitHub Pages.
#
# Split into build + deploy, per GitHub's recommended template, so:
#   * Build runs in a generic runner, no Pages write permissions needed.
#   * Deploy runs in the isolated `github-pages` environment that the
#     repository's Pages settings protect.
#
# Pages source MUST be set to "GitHub Actions" (Settings → Pages → Build
# and deployment → Source). With the classic "Deploy from a branch"
# setting this workflow has no effect.
name: Pages

on:
  # Deploy is chained off the `Benchmark` workflow rather than listening
  # to `push` directly. Rationale:
  #   * Benchmark already runs on every push to main, and it is the
  #     slower of the two pipelines.
  #   * Waiting for it to finish means the `dev/bench/` tree on the
  #     `gh-pages` branch is already refreshed by the time we graft it
  #     into `_site/`, so a single deploy per push is enough to publish
  #     BOTH the latest docs (README etc.) AND the latest benchmark.
  #   * A push that only touches docs still triggers benchmark.yml, so
  #     this chain fires regardless of what changed. The small cost is
  #     that pure-docs updates have to wait for the benchmark job.
  # The `branches` filter + the `conclusion == success` gate below
  # together ensure we only deploy for successful main-branch runs.
  workflow_run:
    workflows: ["Benchmark"]
    types: [completed]
    branches: [main]
  # Allow manual redeploys from the Actions tab, handy for retrying a
  # flaky remote-theme fetch without having to push an empty commit,
  # and as an escape hatch if you want to republish without waiting for
  # a benchmark run (e.g. README-only fix while benchmark is broken).
  workflow_dispatch:

# One in-flight deploy at a time; cancel older runs if a newer push
# supersedes them. This matches the GitHub template exactly and avoids
# a race where an older successful build overwrites a newer one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # For `workflow_run` triggers, only proceed if the upstream Benchmark
    # run succeeded. Other triggers (push / workflow_dispatch) evaluate
    # to `true` because `github.event.workflow_run` is null, which the
    # `!=` comparison handles correctly.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # Emits `base_path` for downstream steps — we pass it through to
        # the Jekyll builder so URLs render with the correct /JitFusion
        # prefix on forks as well (a fork's Pages URL has a different
        # repo-name segment, so hard-coding baseurl here would break it).
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # Merge benchmark history published by `benchmark.yml` into the
      # Jekyll output. The benchmark workflow keeps pushing new data to
      # the `gh-pages` branch (under `dev/bench/`) via
      # benchmark-action/github-action-benchmark; after we flipped the
      # Pages source to "GitHub Actions", that branch is no longer
      # auto-served, so we have to graft its `dev/` tree onto `_site/`
      # here. Missing branch is tolerated (fresh forks without any
      # benchmark run yet).
      #
      # NOTE on the `sudo chown` below: `actions/jekyll-build-pages` is
      # a Docker action that runs as root inside a container, so
      # `./_site` is created owned by root. This step runs on the host
      # as the unprivileged `runner` user, which cannot otherwise write
      # into `_site/`. Fix up ownership once before touching it; the
      # upload-pages-artifact step that follows doesn't care about
      # ownership, only about contents.
      - name: Merge benchmark results from gh-pages
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" ./_site
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            tmp="$(mktemp -d)"
            git clone --depth 1 --branch gh-pages \
              "https://github.com/${GITHUB_REPOSITORY}.git" "$tmp"
            if [ -d "$tmp/dev" ]; then
              mkdir -p ./_site/dev
              cp -R "$tmp/dev/." ./_site/dev/
            fi
            rm -rf "$tmp"
          else
            echo "gh-pages branch not found yet; skipping benchmark merge."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
