name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19 clang-tidy-19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-19 100

      - name: Install Dependencies
        run: |
          sudo apt-get install -y libgtest-dev cmake
          # 编译安装 GoogleTest
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/
          # 安装 xsimd (header-only)
          cd /tmp
          git clone --depth 1 --branch 13.2.0 https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DHAS_XSIMD=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run JitFusion Tests
        run: ./build/jitfusion_test

      - name: Run Athena Tests
        run: ./build/athena_test

  sanitizer:
    runs-on: ubuntu-22.04
    needs: build-and-test
    strategy:
      matrix:
        sanitizer: [address, undefined]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100

      - name: Install Dependencies
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/
          cd /tmp
          git clone --depth 1 --branch 13.2.0 https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Configure CMake with Sanitizer
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSANITIZER=${{ matrix.sanitizer }} \
            -DHAS_XSIMD=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run JitFusion Tests
        run: ./build/jitfusion_test

      - name: Run Athena Tests
        run: ./build/athena_test

  clang-tidy:
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19 clang-tidy-19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-19 100

      - name: Install Dependencies
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/
          cd /tmp
          git clone --depth 1 --branch 13.2.0 https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Configure CMake (for compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DHAS_XSIMD=ON

      - name: Run clang-tidy
        run: |
          find src include athena \
            -name '*.cc' -o -name '*.h' | \
            grep -v 'parser.cc\|parser.hh\|token.cc\|location.hh\|murmurhash3' | \
            xargs -P$(nproc) -I{} clang-tidy -p build {} 2>&1 | tee clang-tidy-output.txt
          if grep -q "error:" clang-tidy-output.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi
