name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 所有 job 共享的环境变量
env:
  LLVM_VERSION: "19"
  XSIMD_VERSION: "13.2.0"
  # 缓存版本号：修改此值可强制刷新所有缓存
  CACHE_VERSION: v1

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM apt packages
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-19
            /usr/bin/clang-19
            /usr/bin/clang++-19
            /usr/bin/llvm-config-19
            /usr/bin/clang-tidy-19
          key: llvm-${{ env.LLVM_VERSION }}-${{ env.CACHE_VERSION }}-tidy

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19 clang-tidy-19

      - name: Setup LLVM alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-19 100

      - name: Cache GTest
        id: cache-gtest
        uses: actions/cache@v4
        with:
          path: /usr/lib/libgtest*.a
          key: gtest-${{ env.CACHE_VERSION }}

      - name: Install GTest
        if: steps.cache-gtest.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/

      - name: Cache xsimd
        id: cache-xsimd
        uses: actions/cache@v4
        with:
          path: /usr/local/include/xsimd
          key: xsimd-${{ env.XSIMD_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Install xsimd
        if: steps.cache-xsimd.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch ${{ env.XSIMD_VERSION }} https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-release-${{ github.sha }}
          restore-keys: |
            ccache-release-

      - name: Setup ccache
        run: |
          sudo apt-get install -y ccache
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DHAS_XSIMD=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: ccache stats
        run: ccache --show-stats

      - name: Run JitFusion Tests
        run: ./build/jitfusion_test

      - name: Run Athena Tests
        run: ./build/athena_test

  sanitizer:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        sanitizer: [address, undefined]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM apt packages
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-19
            /usr/bin/clang-19
            /usr/bin/clang++-19
            /usr/bin/llvm-config-19
          key: llvm-${{ env.LLVM_VERSION }}-${{ env.CACHE_VERSION }}-no-tidy

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19

      - name: Setup LLVM alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100

      - name: Cache GTest
        id: cache-gtest
        uses: actions/cache@v4
        with:
          path: /usr/lib/libgtest*.a
          key: gtest-${{ env.CACHE_VERSION }}

      - name: Install GTest
        if: steps.cache-gtest.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/

      - name: Cache xsimd
        id: cache-xsimd
        uses: actions/cache@v4
        with:
          path: /usr/local/include/xsimd
          key: xsimd-${{ env.XSIMD_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Install xsimd
        if: steps.cache-xsimd.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch ${{ env.XSIMD_VERSION }} https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-sanitizer-${{ matrix.sanitizer }}-${{ github.sha }}
          restore-keys: |
            ccache-sanitizer-${{ matrix.sanitizer }}-

      - name: Setup ccache
        run: |
          sudo apt-get install -y ccache
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure CMake with Sanitizer
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSANITIZER=${{ matrix.sanitizer }} \
            -DHAS_XSIMD=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: ccache stats
        run: ccache --show-stats

      - name: Run JitFusion Tests
        run: ./build/jitfusion_test

      - name: Run Athena Tests
        run: ./build/athena_test

  clang-tidy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM apt packages
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-19
            /usr/bin/clang-19
            /usr/bin/clang++-19
            /usr/bin/llvm-config-19
            /usr/bin/clang-tidy-19
          key: llvm-${{ env.LLVM_VERSION }}-${{ env.CACHE_VERSION }}-tidy

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19 clang-tidy-19

      - name: Setup LLVM alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-19 100

      - name: Cache GTest
        id: cache-gtest
        uses: actions/cache@v4
        with:
          path: /usr/lib/libgtest*.a
          key: gtest-${{ env.CACHE_VERSION }}

      - name: Install GTest
        if: steps.cache-gtest.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/

      - name: Cache xsimd
        id: cache-xsimd
        uses: actions/cache@v4
        with:
          path: /usr/local/include/xsimd
          key: xsimd-${{ env.XSIMD_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Install xsimd
        if: steps.cache-xsimd.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch ${{ env.XSIMD_VERSION }} https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Configure CMake (for compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DHAS_XSIMD=ON

      - name: Run clang-tidy
        run: |
          find src include athena \
            -name '*.cc' -o -name '*.h' | \
            grep -v 'parser.cc\|parser.hh\|token.cc\|location.hh\|murmurhash3' | \
            xargs -P$(nproc) -I{} clang-tidy -p build {} 2>&1 | tee clang-tidy-output.txt
          if grep -q "error:" clang-tidy-output.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi

  bazel-build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM apt packages
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-19
            /usr/bin/clang-19
            /usr/bin/clang++-19
            /usr/bin/llvm-config-19
          key: llvm-${{ env.LLVM_VERSION }}-${{ env.CACHE_VERSION }}-no-tidy

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19

      - name: Setup LLVM alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100

      - name: Cache GTest
        id: cache-gtest
        uses: actions/cache@v4
        with:
          path: /usr/lib/libgtest*.a
          key: gtest-${{ env.CACHE_VERSION }}

      - name: Install GTest
        if: steps.cache-gtest.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/

      - name: Cache xsimd
        id: cache-xsimd
        uses: actions/cache@v4
        with:
          path: /usr/local/include/xsimd
          key: xsimd-${{ env.XSIMD_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Install xsimd
        if: steps.cache-xsimd.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch ${{ env.XSIMD_VERSION }} https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ env.CACHE_VERSION }}-${{ hashFiles('WORKSPACE', 'BUILD', 'llvm_repository.bzl') }}
          restore-keys: |
            bazel-${{ env.CACHE_VERSION }}-

      - name: Install Bazelisk
        run: |
          sudo curl -fSsL -o /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Bazel Build and Test
        run: bazel test //:jitfusion_test //:athena_test

  coverage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM apt packages
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-19
            /usr/bin/clang-19
            /usr/bin/clang++-19
            /usr/bin/llvm-config-19
            /usr/bin/llvm-profdata-19
            /usr/bin/llvm-cov-19
          key: llvm-${{ env.LLVM_VERSION }}-${{ env.CACHE_VERSION }}-coverage

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev clang-19

      - name: Setup LLVM alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-19 100
          sudo update-alternatives --install /usr/bin/llvm-profdata llvm-profdata /usr/bin/llvm-profdata-19 100
          sudo update-alternatives --install /usr/bin/llvm-cov llvm-cov /usr/bin/llvm-cov-19 100

      - name: Cache GTest
        id: cache-gtest
        uses: actions/cache@v4
        with:
          path: /usr/lib/libgtest*.a
          key: gtest-${{ env.CACHE_VERSION }}

      - name: Install GTest
        if: steps.cache-gtest.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib/

      - name: Cache xsimd
        id: cache-xsimd
        uses: actions/cache@v4
        with:
          path: /usr/local/include/xsimd
          key: xsimd-${{ env.XSIMD_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Install xsimd
        if: steps.cache-xsimd.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch ${{ env.XSIMD_VERSION }} https://github.com/xtensor-stack/xsimd.git
          cd xsimd
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo cmake --install build

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure CMake with Coverage
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCOVERAGE=ON \
            -DHAS_XSIMD=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run JitFusion Tests
        run: ./build/jitfusion_test

      - name: Run Athena Tests
        run: ./build/athena_test

      - name: Collect coverage data
        run: |
          # 使用 lcov 收集覆盖率数据（用 llvm-cov gcov 作为 gcov 工具）
          lcov --capture \
            --directory build \
            --output-file coverage.info \
            --gcov-tool $(pwd)/.github/llvm-gcov.sh

          # 过滤掉不需要的文件（系统头文件、第三方库、测试代码、生成的 parser/token 文件）
          lcov --remove coverage.info \
            '/usr/*' \
            '/tmp/*' \
            '*/test/*' \
            '*/gtest/*' \
            '*/athena/parser.cc' \
            '*/athena/parser.hh' \
            '*/athena/token.cc' \
            '*/athena/location.hh' \
            '*/athena/athena_test.cc' \
            '*/murmurhash3.*' \
            '*/build/parser.*' \
            '*/build/token.*' \
            '*/build/location.*' \
            --output-file coverage_filtered.info

          # 打印覆盖率摘要
          lcov --list coverage_filtered.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage_filtered.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
